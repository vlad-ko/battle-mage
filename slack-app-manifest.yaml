display_information:
  name: Battle Mage
  description: AI assistant with GitHub repo intelligence. @mention to ask about your codebase.
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: bm
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - reactions:read
      - chat:write
      - channels:history
      - groups:history

settings:
  event_subscriptions:
    # Replace with your Vercel production URL after deploy
    request_url: https://your-project.vercel.app/api/slack
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - reaction_added
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
